site_name: dota2stats
site_description: Documentation for jeffrey-groneberg/dota2stats
site_url: https://jeffrey-groneberg.github.io/dota2stats/
repo_url: https://github.com/jeffrey-groneberg/dota2stats
repo_name: jeffrey-groneberg/dota2stats
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Usage:
      - Java API: usage-java-api.md
      - Command Line Tool: usage-cli.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - API Reference: api-reference.md
  - Contributing: contributing.md
